<!DOCTYPE html>
<html lang="es">
<head>

<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>INTELLIALL | Visor PETS</title>

<meta name="description" content="Visor seguro de PETS con acceso controlado">
<meta name="robots" content="noindex, nofollow">
<link
    rel="preload"
    href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
    as="script"
>

<link
    rel="preload"
    href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"
    as="script"
>

<link rel="stylesheet" href="styles_visor.css">

</head>
<body>

<div class="app">

    <!-- 🔷 HEADER -->
    <header class="header">

        <div class="logo">
            <span>INTELLIALL</span>
            <small>PETS Viewer</small>
        </div>

        <div class="controls-bar">
            <select id="petSelect"></select>
            <select id="areaSelect"></select>
        </div>

        <div class="actions">
            <button onclick="logout()" class="btn-logout">Salir</button>
        </div>

    </header>


    <!-- 🔷 VISOR -->
    <main class="viewer">

        <div id="pdfContainer" class="pdf-view"></div>

        <!-- LOADER -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Cargando documento...</p>
        </div>

    </main>

</div>

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    if(window["pdfjs-dist/build/pdf"]){

        window.pdfjsLib =
            window["pdfjs-dist/build/pdf"];

    }else{

        window.pdfjsLib = window.pdfjsLib;
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
});

</script>

<script src="visor.js"></script>

</body>
</html>
