<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1.0,
            maximum-scale=1.0,
            user-scalable=no,
            viewport-fit=cover
        "
    />

    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PETS Visor" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="no-referrer" />

    <!-- Favicon SVG inline (cuadrícula PETS teal) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ffffff'/%3E%3Crect x='4' y='4' width='11' height='11' rx='2.5' fill='%2300a88f'/%3E%3Crect x='17' y='4' width='11' height='11' rx='2.5' fill='%2300a88f' opacity='.5'/%3E%3Crect x='4' y='17' width='11' height='11' rx='2.5' fill='%2300a88f' opacity='.5'/%3E%3Crect x='17' y='17' width='11' height='11' rx='2.5' fill='%2300a88f' opacity='.25'/%3E%3C/svg%3E" />
    <!-- Fallback PNG -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="visor.css" />

    <title>PETS — Visor de Procedimientos</title>

</head>

<body>

    <div id="app">

        <!-- ===========================
             OVERLAY MÓVIL (cierra sidebar)
        ============================ -->
        <div id="sidebarOverlay" aria-hidden="true"></div>

        <!-- ===========================
             SIDEBAR
        ============================ -->
        <aside id="sidebar" role="navigation" aria-label="Lista de PETs">

            <!-- Header -->
            <div id="sidebarHeader">

                <div id="logoArea">
                    <!-- Botón cerrar sidebar (móvil) -->
                    <button
                        id="closeSidebarBtn"
                        aria-label="Cerrar menú"
                        title="Cerrar menú"
                    >
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>

                    <div id="logoBrand">
                        <div id="logoMark">
                            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                                <rect x="1" y="1" width="9" height="9" rx="2.5" fill="currentColor" opacity="1"/>
                                <rect x="12" y="1" width="9" height="9" rx="2.5" fill="currentColor" opacity="0.5"/>
                                <rect x="1" y="12" width="9" height="9" rx="2.5" fill="currentColor" opacity="0.5"/>
                                <rect x="12" y="12" width="9" height="9" rx="2.5" fill="currentColor" opacity="0.25"/>
                            </svg>
                        </div>
                        <div id="logoText">
                            <span id="logoTitle">PETS</span>
                            <span id="logoSub">Procedimientos de Trabajo</span>
                        </div>
                    </div>
                </div>

                <!-- Buscador -->
                <div id="searchWrap">
                    <svg id="searchIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Buscar PET o área..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        aria-label="Buscar procedimientos"
                    />
                    <button id="searchClear" aria-label="Limpiar búsqueda" hidden>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                            <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <!-- Filtro rápido de áreas -->
                <div id="areaFilterWrap">
                    <div id="areaFilters" role="group" aria-label="Filtrar por área"></div>
                </div>

            </div>

            <!-- Contador -->
            <div id="petsCounter" aria-live="polite"></div>

            <!-- Lista -->
            <div id="petsList" role="list"></div>

        </aside>

        <!-- ===========================
             ÁREA PRINCIPAL
        ============================ -->
        <main id="viewerArea">

            <!-- Barra superior (móvil) -->
            <div id="topBar">
                <button
                    id="mobileMenuBtn"
                    aria-label="Abrir menú de PETs"
                    aria-expanded="false"
                    aria-controls="sidebar"
                >
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>

                <div id="topBarTitle">
                    <span id="topBarPetName">Selecciona un PET</span>
                    <span id="topBarArea"></span>
                </div>
            </div>

            <!-- Toolbar flotante -->
            <header id="toolbar" role="toolbar" aria-label="Controles del visor">

                <!-- Navegación de páginas -->
                <div id="pageNav">
                    <button id="prevPage" title="Página anterior" aria-label="Página anterior">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div id="pageInfo">
                        <input
                            id="pageInput"
                            type="number"
                            min="1"
                            inputmode="numeric"
                            enterkeyhint="go"
                            autocomplete="off"
                            aria-label="Número de página"
                            title="Ir a página"
                        />
                        <span id="pageSep">/</span>
                        <span id="pageTotal">—</span>
                    </div>
                    <button id="nextPage" title="Página siguiente" aria-label="Página siguiente">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>

                <!-- Divisor -->
                <div class="toolbar-divider" aria-hidden="true"></div>

                <!-- Zoom -->
                <div id="zoomControls">
                    <button id="zoomOut" title="Reducir zoom (Ctrl −)" aria-label="Reducir zoom">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button id="zoomLabel" aria-label="Nivel de zoom actual" title="Click para restablecer zoom">100%</button>
                    <button id="zoomIn" title="Aumentar zoom (Ctrl +)" aria-label="Aumentar zoom">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <!-- Divisor -->
                <div class="toolbar-divider" aria-hidden="true"></div>

                <!-- Ajuste de ancho -->
                <button id="fitWidth" title="Ajustar al ancho" aria-label="Ajustar PDF al ancho">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8h12M2 5l3-3M2 5l3 3M14 11l-3 3M14 11l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

            </header>

            <!-- Contenedor del PDF -->
            <section id="viewerContainer" aria-label="Visor de PDF">

                <!-- Estado vacío inicial -->
                <div id="emptyState">
                    <div id="emptyStateIcon">
                        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                            <rect x="10" y="6" width="36" height="44" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                            <rect x="14" y="10" width="28" height="36" rx="3" stroke="currentColor" stroke-width="1" opacity="0.15"/>
                            <path d="M18 20h20M18 26h20M18 32h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                        </svg>
                    </div>
                    <p id="emptyStateTitle">Selecciona un PET</p>
                    <p id="emptyStateSub">Elige un procedimiento del panel izquierdo para visualizarlo</p>
                </div>

                <!-- Splash loader -->
                <div id="pdfSplashLoader" role="status" aria-label="Cargando PDF">
                    <div class="pdf-splash-content">
                        <div class="pdf-ring"></div>
                        <div class="pdf-loading-text">Cargando PDF</div>
                    </div>
                </div>

                <!-- PDF viewer -->
                <div id="pdfViewer"></div>

            </section>

        </main>

    </div>

    <!-- PDF.js -->
    <script src="pdf.min.js" defer></script>

    <!-- App -->
    <script type="module" src="visor.js"></script>

</body>
</html>
