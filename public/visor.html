<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>INTELLIALL | Visor PETS Profesional</title>
<meta name="description" content="Visor seguro de documentos PETS con acceso controlado y visualización optimizada" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#020617" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- Preload de recursos críticos -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://xnkpjgrxgwkfhgrrzwhu.supabase.co" />

<link rel="stylesheet" href="styles_visor.css" />

<!-- Fallback CSS para evitar FOOC (Flash of Unstyled Content) -->
<style>
    /* Loader inicial rápido */
    body {
        margin: 0;
        padding: 0;
        background: #020617;
        font-family: 'Segoe UI', system-ui, sans-serif;
    }
    
    .app {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #020617;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    
    .app.loaded {
        opacity: 1;
    }
    
    .initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 10000;
    }
    
    .initial-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(34,197,94,0.2);
        border-top-color: #22c55e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .initial-loader p {
        margin: 0;
        font-size: 13px;
        color: #94a3b8;
    }
</style>

</head>
<body>

<!-- Loader inicial -->
<div id="initialLoader" class="initial-loader">
    <div class="initial-spinner"></div>
    <p>Inicializando visor seguro...</p>
</div>

<div class="app" id="app">

    <!-- 🔷 HEADER PREMIUM -->
    <header class="header">

        <div class="logo">
            <span>INTELLIALL</span>
            <small>Professional PETS Viewer</small>
        </div>

        <div class="controls-bar">
            <select id="petSelect" aria-label="Seleccionar mascota"></select>
            <select id="areaSelect" aria-label="Seleccionar área"></select>
        </div>

        <div class="actions">
            <button onclick="logout()" class="btn-logout" aria-label="Cerrar sesión">
                <span>🚪</span> Salir
            </button>
        </div>

    </header>

    <!-- 🔷 VISOR PRINCIPAL -->
    <main class="viewer">

        <!-- Contenedor PDF -->
        <div id="pdfContainer" class="pdf-view"></div>

        <!-- Loader mejorado -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Cargando documento...</p>
            <small style="margin-top: 8px; color: #64748b; font-size: 11px;">Por favor espere</small>
        </div>

    </main>

</div>

<!-- 📌 INDICADOR DE CONEXIÓN (opcional) -->
<div id="connectionStatus" style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 20px; font-size: 10px; color: #22c55e; z-index: 9999; display: none;">
    <span>🟢 Conectado</span>
</div>

<!-- LIBRERÍAS con carga optimizada -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Configuración inicial de PDF.js -->
<script>
    // Configuración temprana de PDF.js
    (function initPdfWorker() {
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            console.log('✅ PDF.js inicializado correctamente');
        } else {
            console.error('❌ PDF.js no cargado, reintentando...');
            // Reintentar después de 500ms
            setTimeout(function() {
                if (typeof pdfjsLib !== 'undefined') {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    console.log('✅ PDF.js inicializado (reintento)');
                }
            }, 500);
        }
    })();
</script>

<!-- Script principal del visor -->
<script src="visor.js"></script>

<!-- Script de inicialización adicional -->
<script>
    (function initializeApp() {
        // Ocultar loader inicial cuando la app esté lista
        window.addEventListener('load', function() {
            const initialLoader = document.getElementById('initialLoader');
            const app = document.getElementById('app');
            
            setTimeout(function() {
                if (initialLoader) {
                    initialLoader.style.opacity = '0';
                    setTimeout(function() {
                        if (initialLoader) initialLoader.style.display = 'none';
                    }, 300);
                }
                if (app) {
                    app.classList.add('loaded');
                }
            }, 500);
        });
        
        // Detectar conexión a internet
        window.addEventListener('online', function() {
            const status = document.getElementById('connectionStatus');
            if (status) {
                status.style.display = 'block';
                status.style.backgroundColor = 'rgba(34,197,94,0.9)';
                status.innerHTML = '<span>🟢 Conectado</span>';
                setTimeout(function() {
                    status.style.display = 'none';
                }, 3000);
            }
        });
        
        window.addEventListener('offline', function() {
            const status = document.getElementById('connectionStatus');
            if (status) {
                status.style.display = 'block';
                status.style.backgroundColor = 'rgba(239,68,68,0.9)';
                status.innerHTML = '<span>🔴 Sin conexión</span>';
            }
        });
        
        // Prevenir salida accidental con teclas
        document.addEventListener('keydown', function(e) {
            // Prevenir Ctrl+R, Ctrl+F5, etc.
            if ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R' || e.key === 'f' || e.key === 'F')) {
                e.preventDefault();
                return false;
            }
            // Prevenir F5
            if (e.key === 'F5') {
                e.preventDefault();
                return false;
            }
        });
        
        console.log('🚀 Visor PETS inicializado correctamente');
    })();
</script>

</body>
</html>
