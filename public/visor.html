<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>INTELLIALL | Visor PETS</title>
<meta name="description" content="Visor seguro de PETS con acceso controlado" />
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="styles_visor.css" />

</head>
<body>

<div class="app">

    <!-- 🔷 HEADER -->
    <header class="header">

        <div class="logo">
            <span>INTELLIALL</span>
            <small>PETS Viewer</small>
        </div>

        <div class="controls-bar">
            <select id="petSelect"></select>
            <select id="areaSelect"></select>
        </div>

        <div class="actions">
            <button onclick="logout()" class="btn-logout">Salir</button>
        </div>

    </header>

    <!-- 🔷 VISOR -->
    <main class="viewer">

        <div id="pdfContainer" class="pdf-view"></div>

        <!-- LOADER -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Cargando documento...</p>
        </div>

    </main>

</div>

<!-- LIBRERÍAS con defer para carga ordenada -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js" defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>

<script defer>
    document.addEventListener("DOMContentLoaded", () => {
        // Asegurarse que pdfjsLib exista
        if (typeof pdfjsLib !== "undefined") {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        } else {
            console.error("pdfjsLib no está disponible");
        }
    });
</script>

<script src="visor.js" defer></script>

</body>
</html>
