<!DOCTYPE html>
<html lang="es">

<head>

    <!-- ========================================
         CONFIGURACIÓN GENERAL
    ========================================= -->
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    
    <meta name="theme-color"
      content="#020617">    

    <title>INTELLIALL | Visor PETS</title>

    <meta name="robots"
          content="noindex, nofollow">

    <!-- ========================================
         CSS
    ========================================= -->
    <link rel="stylesheet"
          href="styles_visor.css">

    <!-- ========================================
         PRELOAD PDF WORKER
         Mejora carga en Chrome/Edge
    ========================================= -->
    <link rel="preload"
      href="pdf.worker.min.js">

    <!-- ========================================
         SUPABASE
    ========================================= -->
    <script defer
        src="https://unpkg.com/@supabase/supabase-js@2">
    </script>

    <!-- ========================================
         PDF.JS LOCAL
         IMPORTANTE:
         Debes tener estos archivos:

         /js/pdf/pdf.min.js
         /js/pdf/pdf.worker.min.js
    ========================================= -->
    <script defer
        crossorigin="anonymous"
        src="pdf.min.js">
    </script>

    <!-- ========================================
        CONFIGURACIÓN PDF.JS
    ========================================= -->
    <script>

    console.log(
        "=== INICIALIZANDO PDF.JS ==="
    );

    // 🚫 VALIDAR PDF.JS
    if(typeof pdfjsLib === "undefined"){

        console.error(
            "❌ PDF.js no cargó"
        );

        document.body.innerHTML = `

            <div style="
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                background:#020617;
                color:white;
                font-family:sans-serif;
                text-align:center;
                padding:24px;
            ">

                <div>

                    <h2 style="
                        margin-bottom:12px;
                        color:#ef4444;
                    ">
                        Error cargando PDF.js
                    </h2>

                    <p>
                        Verifica que:
                    </p>

                    <br>

                    <p>
                        • pdf.min.js exista
                    </p>

                    <p>
                        • pdf.worker.min.js exista
                    </p>

                    <p>
                        • El servidor esté funcionando
                    </p>

                </div>

            </div>
        `;

    }else{

        // ✅ WORKER LOCAL
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "pdf.worker.min.js";

        console.log(
            "✅ PDF.js listo"
        );
    }

    </script>

    <!-- ========================================
         JS PRINCIPAL
    ========================================= -->
    <script defer src="visor.js"></script>
</head>

<body>

    <!-- ========================================
         HEADER
    ========================================= -->
    <header class="header">

        <!-- LOGO -->
        <div class="logo">

            📄 INTELLIALL

        </div>

        <!-- CONTROLES -->
        <div class="controls-bar">

            <!-- SELECT PET -->
            <select id="petSelect">

                <option>
                    Cargando PETS...
                </option>

            </select>

            <!-- SELECT ÁREA -->
            <select id="areaSelect">

                <option>
                    Seleccionar área
                </option>

            </select>

        </div>

        <!-- BOTÓN SALIR -->
        <button id="logoutBtn"
                class="btn-logout">

            Salir

        </button>

    </header>

    <!-- ========================================
         VISOR PDF
    ========================================= -->
    <main class="viewer">

        <div id="pdfContainer"
             class="pdf-view">

        </div>

    </main>

    <!-- ========================================
         LOADER
    ========================================= -->
    <div id="loader"
         class="loader">

        <div class="spinner"></div>

        <p id="progressText">

            Cargando documento...

        </p>

    </div>

    <!-- ========================================
         ALERTAS
    ========================================= -->
    <div id="alertContainer"></div>

</body>

</html>
