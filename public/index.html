<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INTELLIALL | Visor PETS</title>

<meta name="description" content="Visor PETS">
<meta name="robots" content="noindex,nofollow">

<link rel="stylesheet" href="styles_visor.css">

<!-- Librerías simples -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<div class="app">

    <header class="header">

        <div class="logo">
            <h1>📄 INTELLIALL</h1>
            <p>Visor PETS</p>
        </div>

        <div class="controls">

            <select id="petSelect">
                <option value="">Mascota</option>
            </select>

            <select id="areaSelect">
                <option value="">Área</option>
            </select>

        </div>

        <button id="logoutBtn">
            Salir
        </button>

    </header>

    <main class="viewer">

        <div id="pdfContainer" class="pdf-view">

            <p class="message">
                Selecciona una mascota y un área
            </p>

        </div>

        <div id="loader" class="loader">
            <p>Cargando PDF...</p>
        </div>

    </main>

</div>

<!-- Script principal -->
<script src="visor.js"></script>

</body>
</html>
