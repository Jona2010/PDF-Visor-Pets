<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acceso Seguro | INTELLIALL</title>

<meta name="description" content="Acceso seguro al visor de documentos PETS con autenticación protegida para usuarios operativos de Intelliall.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="styles_index.css">

</head>

<body class="login-body">

<div class="login-container">

    <!-- 🔹 IZQUIERDA -->
    <div class="login-left">

        <div class="brand-box">
            <h1>INTELLIALL</h1>
            <p>PETS Viewer</p>
            <span>Acceso seguro a documentación operativa</span>
        </div>

        <div class="brand-info">
            <small>
                Plataforma protegida para consulta de procedimientos,
                estándares y documentación interna.
            </small>
        </div>

    </div>

    <!-- 🔹 DERECHA -->
    <div class="login-right">

        <div class="login-card">

            <h2>Iniciar Sesión</h2>
            <p class="login-subtitle">
                Ingresa con tus credenciales autorizadas
            </p>

            <!-- 🔥 FORMULARIO USUARIO -->
            <form id="loginForm">

                <!-- EMAIL -->
                <div class="input-group">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Correo electrónico"
                        autocomplete="username"
                        required
                    >
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Contraseña"
                        autocomplete="current-password"
                        required
                    >
                    <span id="togglePass" class="toggle-pass">👁️</span>
                </div>

                <!-- OPCIONES -->
                <div class="login-options">
                    <label>
                        <input type="checkbox">
                        Recordarme
                    </label>

                    <span class="forgot">
                        ¿Olvidaste?
                    </span>
                </div>

                <!-- BOTÓN LOGIN -->
                <button type="submit" class="login-btn">
                    Ingresar
                </button>

            </form>

            <!-- 🔐 DIVISOR -->
            <div class="login-divider">
                <span>Acceso restringido</span>
            </div>

            <!-- 🔥 BOTÓN ADMIN -->
            <button
                type="button"
                class="admin-btn"
                onclick="location.href='admin-login.html'"
            >
                🔐 Ingresar como Administrador
            </button>

        </div>

    </div>

</div>

<!-- LIBRERÍA SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- APP LOGIN USUARIO -->
<script src="app.js"></script>

</body>
</html>
